version: '3.8'
services:
  # Tu base de datos temporal en memoria y gestor de colas (BullMQ)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # El balanceador de carga
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend-1
      - backend-2

  # Tus instancias de backend para escalamiento horizontal
  backend-1:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3000"

  backend-2:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3000"